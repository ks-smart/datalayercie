<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Information Exchange — Data as Fascia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0c10;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  .canvas-wrap {
    position: relative;
    width: 900px;
    height: 900px;
  }

  .title-block {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
  }

  .title-block h1 {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 22px;
    color: #e8dcc8;
    letter-spacing: 0.02em;
    text-shadow: 0 0 40px rgba(210,185,130,0.4);
  }

  .title-block p {
    font-size: 9px;
    color: #6b7a6a;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  svg {
    width: 100%;
    height: 100%;
  }

  /* Sector node labels */
  .sector-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    fill: #c9d4b8;
  }

  .sector-sublabel {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    fill: #5a6b52;
    letter-spacing: 0.1em;
  }

  .center-label {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 13px;
    fill: #d4c89a;
    text-anchor: middle;
  }

  .data-label {
    font-family: 'DM Mono', monospace;
    font-size: 7.5px;
    fill: #4a7a5a;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<div class="canvas-wrap">
  <div class="title-block">
    <h1>The Data Layer</h1>
    <p>Community Information Exchange · Connective Tissue Architecture</p>
  </div>

  <svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Background radial gradient -->
      <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#0f1a12"/>
        <stop offset="100%" stop-color="#060809"/>
      </radialGradient>

      <!-- Fascia fiber gradients for each sector connection -->
      <linearGradient id="fasciaHealth" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#a8d4b0" stop-opacity="0.7"/>
        <stop offset="50%" stop-color="#7ab89a" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#3a8a5a" stop-opacity="0.6"/>
      </linearGradient>
      <linearGradient id="fasciaHousing" x1="100%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#c4b87a" stop-opacity="0.7"/>
        <stop offset="50%" stop-color="#b8a45a" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#8a7a2a" stop-opacity="0.6"/>
      </linearGradient>
      <linearGradient id="fasciaWorkforce" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#9ac4d4" stop-opacity="0.7"/>
        <stop offset="50%" stop-color="#6aaabb" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#3a7a9a" stop-opacity="0.6"/>
      </linearGradient>
      <linearGradient id="fasciaChildcare" x1="100%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" stop-color="#d4a8c4" stop-opacity="0.7"/>
        <stop offset="50%" stop-color="#b87aaa" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#8a3a7a" stop-opacity="0.6"/>
      </linearGradient>
      <linearGradient id="fasciaFunding" x1="50%" y1="100%" x2="50%" y2="0%">
        <stop offset="0%" stop-color="#d4c48a" stop-opacity="0.7"/>
        <stop offset="50%" stop-color="#c4a84a" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#9a8a2a" stop-opacity="0.6"/>
      </linearGradient>

      <!-- Central data pool glow -->
      <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#4a8a6a" stop-opacity="0.9"/>
        <stop offset="40%" stop-color="#2a5a4a" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#0a1a14" stop-opacity="0"/>
      </radialGradient>

      <radialGradient id="centerCore" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#8ad4aa" stop-opacity="1"/>
        <stop offset="60%" stop-color="#3a7a5a" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#1a3a2a" stop-opacity="0.4"/>
      </radialGradient>

      <!-- Node glows per sector -->
      <radialGradient id="glowHealth" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#a8d4b0" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#3a8a5a" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="glowHousing" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#d4c880" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#8a7a2a" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="glowWorkforce" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#9ac4d4" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#3a7a9a" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="glowChildcare" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#d4a8c4" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#8a3a7a" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="glowFunding" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#d4c48a" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#9a8a2a" stop-opacity="0"/>
      </radialGradient>

      <!-- Fiber texture filter -->
      <filter id="fiberBlur" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.65 0.15" numOctaves="3" seed="2" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
      </filter>

      <filter id="softGlow">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <filter id="nodeGlow">
        <feGaussianBlur stdDeviation="8" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <!-- Clip path for bounds -->
      <clipPath id="mainClip">
        <rect x="0" y="0" width="900" height="900"/>
      </clipPath>
    </defs>

    <!-- Background -->
    <rect width="900" height="900" fill="url(#bgGrad)"/>

    <!-- Subtle grid/tissue background texture -->
    <g opacity="0.04" clip-path="url(#mainClip)">
      <!-- Organic hexagonal mesh suggestion -->
      <path d="M450,150 L520,190 L520,270 L450,310 L380,270 L380,190 Z" fill="none" stroke="#4a8a5a" stroke-width="0.5"/>
      <path d="M450,310 L520,350 L520,430 L450,470 L380,430 L380,350 Z" fill="none" stroke="#4a8a5a" stroke-width="0.5"/>
      <path d="M450,470 L520,510 L520,590 L450,630 L380,590 L380,510 Z" fill="none" stroke="#4a8a5a" stroke-width="0.5"/>
      <path d="M610,230 L680,270 L680,350 L610,390 L540,350 L540,270 Z" fill="none" stroke="#4a8a5a" stroke-width="0.5"/>
      <path d="M290,230 L360,270 L360,350 L290,390 L220,350 L220,270 Z" fill="none" stroke="#4a8a5a" stroke-width="0.5"/>
    </g>

    <!-- ===================== FASCIA TISSUE BUNDLES ===================== -->
    <!-- 
      Center = 450,450
      Health (top-left)     = 175, 240
      Housing (top-right)   = 725, 240
      Workforce (bot-right) = 725, 660
      Childcare (bot-left)  = 175, 660
      Funding (bottom)      = 450, 750
    -->

    <!-- === HEALTH FASCIA BUNDLE (top-left) === -->
    <!-- Multiple overlapping paths to simulate fascia sheet -->
    <g filter="url(#fiberBlur)" opacity="0.55">
      <path d="M175,240 C240,280 300,340 380,400 C400,415 420,430 450,450" fill="none" stroke="#7ab89a" stroke-width="14" stroke-linecap="round" opacity="0.25"/>
      <path d="M175,240 C245,275 305,335 385,398 C405,412 425,428 450,450" fill="none" stroke="#a8d4b0" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
      <path d="M175,240 C235,285 295,345 375,402 C396,417 422,432 450,450" fill="none" stroke="#6aa88a" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
      <path d="M175,240 C250,270 310,330 390,395 C408,410 428,426 450,450" fill="none" stroke="#c8e8d0" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </g>
    <!-- Fine fibers -->
    <g opacity="0.3">
      <path d="M185,235 C255,278 318,338 395,400 C412,413 430,427 450,450" fill="none" stroke="#a8d4b0" stroke-width="1" stroke-dasharray="3,4"/>
      <path d="M168,250 C232,288 298,342 376,404 C394,418 420,433 450,450" fill="none" stroke="#8ab89a" stroke-width="0.8" stroke-dasharray="2,5"/>
      <path d="M178,260 C245,295 305,352 382,408 C400,420 424,436 450,450" fill="none" stroke="#c4e0cc" stroke-width="0.6"/>
    </g>

    <!-- === HOUSING FASCIA BUNDLE (top-right) === -->
    <g filter="url(#fiberBlur)" opacity="0.55">
      <path d="M725,240 C660,280 600,340 520,400 C500,415 480,430 450,450" fill="none" stroke="#b8a45a" stroke-width="14" stroke-linecap="round" opacity="0.25"/>
      <path d="M725,240 C655,275 595,335 515,398 C495,412 475,428 450,450" fill="none" stroke="#d4c870" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
      <path d="M725,240 C665,285 605,345 525,402 C504,417 478,432 450,450" fill="none" stroke="#c0a840" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
      <path d="M725,240 C650,270 590,330 510,395 C492,410 472,426 450,450" fill="none" stroke="#ecdda4" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </g>
    <g opacity="0.3">
      <path d="M715,235 C645,278 582,338 505,400 C488,413 470,427 450,450" fill="none" stroke="#d4c870" stroke-width="1" stroke-dasharray="3,4"/>
      <path d="M732,250 C668,288 602,342 524,404 C506,418 480,433 450,450" fill="none" stroke="#b8a448" stroke-width="0.8" stroke-dasharray="2,5"/>
    </g>

    <!-- === WORKFORCE FASCIA BUNDLE (bot-right) === -->
    <g filter="url(#fiberBlur)" opacity="0.55">
      <path d="M725,660 C660,620 600,560 520,500 C500,485 480,470 450,450" fill="none" stroke="#6aaabb" stroke-width="14" stroke-linecap="round" opacity="0.25"/>
      <path d="M725,660 C655,625 595,565 515,502 C495,488 475,472 450,450" fill="none" stroke="#9ac4d4" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
      <path d="M725,660 C665,615 605,555 525,498 C504,483 478,468 450,450" fill="none" stroke="#5a9aaa" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
      <path d="M725,660 C650,630 590,570 510,505 C492,490 472,474 450,450" fill="none" stroke="#b4d8e8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </g>
    <g opacity="0.3">
      <path d="M715,665 C645,622 582,562 505,500 C488,487 470,473 450,450" fill="none" stroke="#9ac4d4" stroke-width="1" stroke-dasharray="3,4"/>
      <path d="M732,650 C668,612 602,558 524,496 C506,482 480,467 450,450" fill="none" stroke="#7aabbc" stroke-width="0.8" stroke-dasharray="2,5"/>
    </g>

    <!-- === CHILDCARE FASCIA BUNDLE (bot-left) === -->
    <g filter="url(#fiberBlur)" opacity="0.55">
      <path d="M175,660 C240,620 300,560 380,500 C400,485 420,470 450,450" fill="none" stroke="#b87aaa" stroke-width="14" stroke-linecap="round" opacity="0.25"/>
      <path d="M175,660 C245,625 305,565 385,502 C405,488 425,472 450,450" fill="none" stroke="#d4a8c4" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
      <path d="M175,660 C235,615 295,555 375,498 C396,483 422,468 450,450" fill="none" stroke="#a86a9a" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
      <path d="M175,660 C250,630 310,570 390,505 C408,490 428,474 450,450" fill="none" stroke="#e8c4dc" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </g>
    <g opacity="0.3">
      <path d="M185,665 C255,622 318,562 395,500 C412,487 430,473 450,450" fill="none" stroke="#d4a8c4" stroke-width="1" stroke-dasharray="3,4"/>
      <path d="M168,650 C232,612 298,558 376,496 C394,482 420,467 450,450" fill="none" stroke="#b87aaa" stroke-width="0.8" stroke-dasharray="2,5"/>
    </g>

    <!-- === FUNDING FASCIA BUNDLE (bottom) === -->
    <g filter="url(#fiberBlur)" opacity="0.55">
      <path d="M450,750 C450,700 450,620 450,500 C450,480 450,465 450,450" fill="none" stroke="#c4a84a" stroke-width="14" stroke-linecap="round" opacity="0.25"/>
      <path d="M450,750 C452,700 453,618 451,500 C450,480 450,465 450,450" fill="none" stroke="#d4c48a" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
      <path d="M450,750 C448,700 447,618 449,500 C449,480 450,465 450,450" fill="none" stroke="#b09030" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
      <path d="M450,750 C456,698 458,615 454,498 C452,479 451,465 450,450" fill="none" stroke="#ecdda0" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </g>
    <g opacity="0.3">
      <path d="M444,750 C444,700 445,618 446,500 C447,480 449,465 450,450" fill="none" stroke="#d4c48a" stroke-width="1" stroke-dasharray="3,4"/>
      <path d="M456,748 C457,698 456,616 454,499 C453,480 451,465 450,450" fill="none" stroke="#c0a840" stroke-width="0.8" stroke-dasharray="2,5"/>
    </g>

    <!-- ===================== CROSS-FIBER CONNECTIONS (sector-to-sector) ===================== -->
    <!-- Health ↔ Housing -->
    <path d="M200,255 C350,220 550,220 700,255" fill="none" stroke="#9ac8b0" stroke-width="1.5" opacity="0.2" stroke-dasharray="4,6"/>
    <path d="M190,270 C340,230 560,228 710,260" fill="none" stroke="#c4d8a0" stroke-width="0.7" opacity="0.15"/>
    <!-- Health ↔ Childcare -->
    <path d="M155,280 C140,420 148,560 165,640" fill="none" stroke="#c4a8d4" stroke-width="1.5" opacity="0.2" stroke-dasharray="4,6"/>
    <!-- Housing ↔ Workforce -->
    <path d="M745,280 C760,420 752,560 735,640" fill="none" stroke="#aac4d4" stroke-width="1.5" opacity="0.2" stroke-dasharray="4,6"/>
    <!-- Childcare ↔ Funding -->
    <path d="M200,670 C280,720 370,745 440,748" fill="none" stroke="#d4b8c4" stroke-width="1.5" opacity="0.2" stroke-dasharray="4,6"/>
    <!-- Workforce ↔ Funding -->
    <path d="M700,670 C620,720 530,745 460,748" fill="none" stroke="#b4c8d4" stroke-width="1.5" opacity="0.2" stroke-dasharray="4,6"/>
    <!-- Health ↔ Workforce (diagonal cross) -->
    <path d="M200,260 C350,320 560,520 700,640" fill="none" stroke="#a8c4b0" stroke-width="0.8" opacity="0.12" stroke-dasharray="3,8"/>
    <!-- Housing ↔ Childcare (diagonal cross) -->
    <path d="M700,260 C560,320 350,520 210,640" fill="none" stroke="#c4b8a8" stroke-width="0.8" opacity="0.12" stroke-dasharray="3,8"/>

    <!-- ===================== SCATTERED DATA NODES along fibers ===================== -->
    <!-- Small circles representing data exchange points -->
    <g opacity="0.7">
      <!-- Along health fiber -->
      <circle cx="270" cy="318" r="3.5" fill="#7ab89a" opacity="0.8"/>
      <circle cx="340" cy="368" r="2.5" fill="#a8d4b0" opacity="0.6"/>
      <circle cx="395" cy="413" r="3" fill="#8ac8a0" opacity="0.7"/>
      <!-- Along housing fiber -->
      <circle cx="630" cy="318" r="3.5" fill="#c4b860" opacity="0.8"/>
      <circle cx="560" cy="368" r="2.5" fill="#d4c870" opacity="0.6"/>
      <circle cx="505" cy="413" r="3" fill="#baa840" opacity="0.7"/>
      <!-- Along workforce fiber -->
      <circle cx="630" cy="582" r="3.5" fill="#7ab0c0" opacity="0.8"/>
      <circle cx="560" cy="532" r="2.5" fill="#9ac4d4" opacity="0.6"/>
      <circle cx="505" cy="487" r="3" fill="#5a9aaa" opacity="0.7"/>
      <!-- Along childcare fiber -->
      <circle cx="270" cy="582" r="3.5" fill="#c498b8" opacity="0.8"/>
      <circle cx="340" cy="532" r="2.5" fill="#d4a8c4" opacity="0.6"/>
      <circle cx="395" cy="487" r="3" fill="#aa78a0" opacity="0.7"/>
      <!-- Along funding fiber -->
      <circle cx="450" cy="680" r="3.5" fill="#c4b460" opacity="0.8"/>
      <circle cx="450" cy="615" r="2.5" fill="#d4c888" opacity="0.6"/>
      <circle cx="450" cy="545" r="3" fill="#b09040" opacity="0.7"/>
    </g>

    <!-- ===================== DATA LABEL ANNOTATIONS ===================== -->
    <!-- Scattered small data field labels along fibers -->
    <text x="282" y="310" class="data-label" opacity="0.6">EHR_RECORD</text>
    <text x="610" y="308" class="data-label" opacity="0.6" text-anchor="end">ADDRESS_HISTORY</text>
    <text x="640" y="572" class="data-label" opacity="0.6">EMPLOYMENT_STATUS</text>
    <text x="240" y="572" class="data-label" opacity="0.6" text-anchor="end">ENROLLMENT_DATA</text>
    <text x="462" y="690" class="data-label" opacity="0.6">GRANT_ALLOCATION</text>
    <text x="310" y="360" class="data-label" opacity="0.45">DIAGNOSIS_CODE</text>
    <text x="570" y="355" class="data-label" opacity="0.45" text-anchor="end">UNIT_AVAILABILITY</text>
    <text x="360" y="516" class="data-label" opacity="0.45">CHILDCARE_SLOT</text>
    <text x="540" y="516" class="data-label" opacity="0.45">WAGE_DATA</text>
    <text x="462" y="638" class="data-label" opacity="0.45">CONTRACT_ID</text>

    <!-- ===================== CENTER DATA POOL ===================== -->
    <!-- Outer glow ring -->
    <circle cx="450" cy="450" r="85" fill="url(#centerGlow)" opacity="0.8"/>
    <!-- Pulsing membrane rings -->
    <circle cx="450" cy="450" r="68" fill="none" stroke="#3a7a5a" stroke-width="1" opacity="0.4"/>
    <circle cx="450" cy="450" r="58" fill="none" stroke="#4a8a6a" stroke-width="0.6" opacity="0.35" stroke-dasharray="5,4"/>
    <circle cx="450" cy="450" r="72" fill="none" stroke="#2a6a4a" stroke-width="0.5" opacity="0.25" stroke-dasharray="8,3"/>
    <!-- Core -->
    <circle cx="450" cy="450" r="48" fill="url(#centerCore)" opacity="0.95" filter="url(#nodeGlow)"/>
    <circle cx="450" cy="450" r="34" fill="#1a3a2a" opacity="0.7"/>
    <circle cx="450" cy="450" r="22" fill="#2a5a3a" opacity="0.9"/>
    <circle cx="450" cy="450" r="10" fill="#6ad4a0" opacity="0.95"/>

    <!-- Center labels -->
    <text x="450" y="446" class="center-label">data layer</text>
    <text x="450" y="460" class="data-label" text-anchor="middle" opacity="0.5">SHARED INFRASTRUCTURE</text>

    <!-- ===================== SECTOR NODES ===================== -->

    <!-- HEALTH (top-left) 175,240 -->
    <circle cx="175" cy="240" r="55" fill="#0a1812" opacity="0.9"/>
    <circle cx="175" cy="240" r="50" fill="none" stroke="#7ab89a" stroke-width="1.5" opacity="0.5"/>
    <circle cx="175" cy="240" r="42" fill="none" stroke="#a8d4b0" stroke-width="0.6" opacity="0.3" stroke-dasharray="4,3"/>

    <circle cx="175" cy="240" r="6" fill="#a8e8c0" opacity="1"/>
    <!-- Organic membrane lines -->
    <path d="M145,215 C155,225 165,230 175,240 C185,230 195,225 205,215" fill="none" stroke="#7ab89a" stroke-width="0.5" opacity="0.3"/>

    <text x="175" y="208" class="sector-sublabel" text-anchor="middle">clinical · behavioral · social</text>

    <!-- HOUSING (top-right) 725,240 -->
    <circle cx="725" cy="240" r="55" fill="#1a1808" opacity="0.9"/>

    <path d="M698,268 C708,256 715,250 725,240 C735,250 742,256 752,268" fill="none" stroke="#c4b858" stroke-width="0.5" opacity="0.3"/>
